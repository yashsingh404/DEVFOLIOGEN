<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="980" fill="#F7F5F0"/>
  <rect x="50" y="40" width="1500" height="900" rx="28" fill="#FFFDF8" stroke="#E8E1D4" stroke-width="2"/>

  <text x="90" y="105" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">DevFolioGen Architecture</text>
  <text x="90" y="140" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="18">High-level flow from username input to rendered portfolio output</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#A16207"/>
    </marker>
  </defs>

  <g filter="url(#shadow)">
    <rect x="90" y="200" width="250" height="110" rx="24" fill="#FFF7ED" stroke="#FDBA74" stroke-width="2"/>
    <text x="215" y="245" text-anchor="middle" fill="#9A3412" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1">INPUT</text>
    <text x="215" y="277" text-anchor="middle" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">User</text>
    <text x="215" y="302" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">Enters GitHub username</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="410" y="190" width="330" height="130" rx="24" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
    <text x="575" y="232" text-anchor="middle" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1">FRONTEND</text>
    <text x="575" y="265" text-anchor="middle" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Landing + Portfolio Route</text>
    <text x="575" y="292" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">`/` and `/[username]` in Next.js</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="810" y="170" width="320" height="170" rx="24" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
    <text x="970" y="212" text-anchor="middle" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1">INTERNAL APIs</text>
    <text x="970" y="245" text-anchor="middle" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">API Layer</text>
    <text x="970" y="275" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">Profile API</text>
    <text x="970" y="300" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">Projects API</text>
    <text x="970" y="325" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">About / PRs / Contributions APIs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1190" y="190" width="300" height="130" rx="24" fill="#FAF5FF" stroke="#D8B4FE" stroke-width="2"/>
    <text x="1340" y="232" text-anchor="middle" fill="#7E22CE" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1">COMPOSITION</text>
    <text x="1340" y="265" text-anchor="middle" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Profile Service</text>
    <text x="1340" y="292" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">Normalizes data for the UI</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="130" y="470" width="320" height="160" rx="24" fill="#FFFBEB" stroke="#FCD34D" stroke-width="2"/>
    <text x="290" y="512" text-anchor="middle" fill="#A16207" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1">DATA SOURCES</text>
    <text x="290" y="545" text-anchor="middle" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">GitHub Fetchers</text>
    <text x="290" y="575" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">REST + GraphQL fetch user profile, repos,</text>
    <text x="290" y="600" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">languages, PRs, and contribution signals</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="510" y="470" width="260" height="160" rx="24" fill="#FDF4FF" stroke="#F0ABFC" stroke-width="2"/>
    <text x="640" y="512" text-anchor="middle" fill="#A21CAF" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1">OPTIONAL ENRICHMENT</text>
    <text x="640" y="545" text-anchor="middle" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">AI Generator</text>
    <text x="640" y="575" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">Creates summary, highlights,</text>
    <text x="640" y="600" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">skills, and SEO metadata</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="830" y="470" width="270" height="160" rx="24" fill="#ECFEFF" stroke="#67E8F9" stroke-width="2"/>
    <text x="965" y="512" text-anchor="middle" fill="#0F766E" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1">STATE LAYER</text>
    <text x="965" y="545" text-anchor="middle" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Cache Layer</text>
    <text x="965" y="575" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">Stores computed API results</text>
    <text x="965" y="600" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">for faster repeated portfolio loads</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1160" y="450" width="300" height="200" rx="24" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="2"/>
    <text x="1310" y="492" text-anchor="middle" fill="#6D28D9" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1">PERSISTENCE</text>
    <text x="1310" y="525" text-anchor="middle" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Database / Memory</text>
    <text x="1310" y="555" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">Postgres + Prisma in full mode</text>
    <text x="1310" y="580" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">In-memory fallback in lightweight mode</text>
    <text x="1310" y="605" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">Also supports custom URLs and auth state</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="760" width="360" height="130" rx="24" fill="#EEF2FF" stroke="#A5B4FC" stroke-width="2"/>
    <text x="560" y="802" text-anchor="middle" fill="#4338CA" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1">PRESENTATION</text>
    <text x="560" y="835" text-anchor="middle" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Portfolio UI Components</text>
    <text x="560" y="862" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">Hero, projects, about, languages, footer</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="890" y="760" width="330" height="130" rx="24" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
    <text x="1055" y="802" text-anchor="middle" fill="#166534" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1">OUTPUT</text>
    <text x="1055" y="835" text-anchor="middle" fill="#18181B" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Rendered Portfolio</text>
    <text x="1055" y="862" text-anchor="middle" fill="#57534E" font-family="Arial, Helvetica, sans-serif" font-size="18">A generated developer portfolio page</text>
  </g>

  <path d="M340 255H410" stroke="#A16207" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M740 255H810" stroke="#A16207" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1130 255H1190" stroke="#A16207" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M1340 320V390H290V470" stroke="#A16207" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1340 320V390H640V470" stroke="#A16207" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1340 320V390H965V470" stroke="#A16207" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1340 320V450" stroke="#A16207" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M290 630V695H560V760" stroke="#A16207" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M640 630V695H560V760" stroke="#A16207" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M965 630V695H560V760" stroke="#A16207" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1310 650V695H560V760" stroke="#A16207" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M740 825H890" stroke="#A16207" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="90" y="920" fill="#78716C" font-family="Arial, Helvetica, sans-serif" font-size="16">Core flow: User input -> API orchestration -> GitHub / AI / Cache -> normalized data -> rendered portfolio</text>
</svg>
